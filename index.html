<!DOCTYPE html>
<html>
<head>
<title>Open</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0b0b;
font-family:Arial;
color:white;
flex-direction:column;
}

.envelope{
width:220px;
height:140px;
background:#1e1e1e;
position:relative;
border-radius:8px;
cursor:pointer;
box-shadow:0 0 25px rgba(255,70,120,0.2);
transition:0.3s;
}

.envelope:hover{
transform:scale(1.05);
}

.envelope:before{
content:"";
position:absolute;
top:-70px;
left:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:70px solid #2b2b2b;
}

.text{
margin-top:30px;
font-size:20px;
letter-spacing:2px;
color:#ff4d6d;
text-align:center;
}

</style>

</head>

<body>

<div class="envelope" onclick="openPage()"></div>

<div class="text">
CLICK TO OPEN<br><br>
HAY…<br>
I M SORRY CHOTU BABY
</div>

<script>

function openPage(){
window.location.href="page2.html";
}

</script>

</body>
</html>
